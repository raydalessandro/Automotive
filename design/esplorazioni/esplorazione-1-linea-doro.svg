      C 380 352 372 338 350 334
      C 342 332 338 330 334 318
      C 328 292 318 262 296 256
      C 288 254 280 252 268 252
      L 158 252
      C 128 252 114 264 111 290
      L 106 396
      C 105 404 102 410 92 410
      L 560 410
      L 596 410
      a 22 22 0 1 1 0.6 0
      L 788 410
      a 22 22 0 1 1 0.6 0
      L 856 410
      C 872 410 879 400 877 386
      C 874 362 858 352 830 348
      C 806 344 794 340 782 320
      C 770 300 752 292 722 290
      L 672 290
      C 634 292 606 302 590 328
      C 581 342 578 366 578 392
      C 578 402 574 410 564 410
      L 1040 410
      L 1076 410
      a 22 22 0 1 1 0.6 0
      L 1268 410
      a 22 22 0 1 1 0.6 0
      L 1334 410
      C 1350 410 1357 398 1355 380
      C 1352 354 1340 344 1318 340
