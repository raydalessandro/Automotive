      C 1063 400 1059 410 1049 410
      L 1420 410"/>
  </defs>

  <rect width="1400" height="560" fill="#12100D"/>

  <!-- filo di terra, appena percettibile, sotto tutto -->
  <line x1="0" y1="410" x2="1400" y2="410" stroke="#B08D4F" stroke-width="0.4" opacity="0.18"/>

  <!-- bagliore -->
  <use href="#linea" stroke="#C9A96B" stroke-width="6" opacity="0.28" filter="url(#glow)"
       stroke-linecap="round" stroke-linejoin="round"/>
  <!-- la linea -->
  <use href="#linea" stroke="url(#oro)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- fanali: tre punti di luce -->
  <circle cx="371" cy="356" r="3.2" fill="#F4E3B8"/>
  <circle cx="867" cy="368" r="3.2" fill="#F4E3B8"/>
  <circle cx="1346" cy="362" r="3.2" fill="#F4E3B8"/>

  <!-- etichette segmento -->
  <g fill="#B08D4F" font-family="Helvetica, Arial, sans-serif" font-size="19" letter-spacing="6" text-anchor="middle" opacity="0.9">
    <text x="235" y="492">ARTIGIANI</text>
    <text x="718" y="492">AGENTI</text>
    <text x="1205" y="492">AZIENDE</text>
  </g>

  <!-- didascalia concetto -->
  <g text-anchor="middle">
    <text x="700" y="80" fill="url(#oro)" font-size="34" letter-spacing="10">UNA SOLA LINEA</text>
    <text x="700" y="112" fill="#F2EEE6" opacity="0.6" font-family="Helvetica, Arial, sans-serif" font-size="16" letter-spacing="3">un canone, tutto incluso — la stessa strada per ogni mestiere</text>
  </g>
</svg>
