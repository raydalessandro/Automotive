<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="oroR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EBD9A9"/>
      <stop offset=".55" stop-color="#C9A96B"/>
      <stop offset="1" stop-color="#8A6B3A"/>
    </linearGradient>
    <g id="petali1" fill="none" stroke="#B08D4F" stroke-width="0.8">
      <ellipse rx="248" ry="78"/>
      <ellipse rx="248" ry="78" transform="rotate(15)"/>
      <ellipse rx="248" ry="78" transform="rotate(30)"/>
      <ellipse rx="248" ry="78" transform="rotate(45)"/>
      <ellipse rx="248" ry="78" transform="rotate(60)"/>
      <ellipse rx="248" ry="78" transform="rotate(75)"/>
      <ellipse rx="248" ry="78" transform="rotate(90)"/>
      <ellipse rx="248" ry="78" transform="rotate(105)"/>
      <ellipse rx="248" ry="78" transform="rotate(120)"/>
      <ellipse rx="248" ry="78" transform="rotate(135)"/>
      <ellipse rx="248" ry="78" transform="rotate(150)"/>
      <ellipse rx="248" ry="78" transform="rotate(165)"/>
    </g>
    <g id="petali2" fill="none" stroke="#B08D4F" stroke-width="0.7">
      <ellipse rx="176" ry="52" transform="rotate(7.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(22.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(37.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(52.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(67.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(82.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(97.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(112.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(127.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(142.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(157.5)"/>
      <ellipse rx="176" ry="52" transform="rotate(172.5)"/>
    </g>
  </defs>

  <rect width="900" height="900" fill="#12100D"/>

  <!-- pneumatico: la linea -->
  <circle cx="450" cy="420" r="298" fill="none" stroke="url(#oroR)" stroke-width="3"/>
  <circle cx="450" cy="420" r="281" fill="none" stroke="#B08D4F" stroke-width="1" opacity="0.55"/>

  <!-- cerchione: l'incisione -->
  <use href="#petali1" transform="translate(450 420)" opacity="0.5"/>
  <use href="#petali2" transform="translate(450 420)" opacity="0.32"/>

  <!-- mozzo -->
  <circle cx="450" cy="420" r="46" fill="#12100D" stroke="#C9A96B" stroke-width="1.2"/>
  <circle cx="450" cy="420" r="9" fill="url(#oroR)"/>

  <!-- velocità -->
  <g stroke="#C9A96B" stroke-width="2.6" stroke-linecap="round">
    <line x1="58" y1="372" x2="118" y2="372" opacity="0.4"/>
    <line x1="30" y1="420" x2="122" y2="420" opacity="0.7"/>
    <line x1="58" y1="468" x2="118" y2="468" opacity="0.4"/>
  </g>

  <!-- didascalia -->
  <g text-anchor="middle">
    <text x="450" y="806" fill="url(#oroR)" font-size="30" letter-spacing="13">LA RUOTA</text>
    <text x="450" y="838" fill="#F2EEE6" opacity="0.55" font-family="Helvetica, Arial, sans-serif"
          font-size="15" letter-spacing="3">dove l'incisione incontra la linea · favicon · spinner · sigillo</text>
  </g>
</svg>
