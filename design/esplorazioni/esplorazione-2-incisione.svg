<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="oroV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EBD9A9"/>
      <stop offset=".55" stop-color="#C9A96B"/>
      <stop offset="1" stop-color="#8F6D3C"/>
    </linearGradient>
    <g id="rosetta" fill="none" stroke="#B08D4F" stroke-width="0.6">
      <ellipse rx="64" ry="20" transform="rotate(0)"/>
      <ellipse rx="64" ry="20" transform="rotate(15)"/>
      <ellipse rx="64" ry="20" transform="rotate(30)"/>
      <ellipse rx="64" ry="20" transform="rotate(45)"/>
      <ellipse rx="64" ry="20" transform="rotate(60)"/>
      <ellipse rx="64" ry="20" transform="rotate(75)"/>
      <ellipse rx="64" ry="20" transform="rotate(90)"/>
      <ellipse rx="64" ry="20" transform="rotate(105)"/>
      <ellipse rx="64" ry="20" transform="rotate(120)"/>
      <ellipse rx="64" ry="20" transform="rotate(135)"/>
      <ellipse rx="64" ry="20" transform="rotate(150)"/>
      <ellipse rx="64" ry="20" transform="rotate(165)"/>
      <circle r="2.4" fill="#B08D4F" stroke="none"/>
    </g>
    <path id="onda" fill="none" stroke="#B08D4F" stroke-width="0.7"
      d="M0 0 q 30 -12 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0"/>
  </defs>

  <rect width="1200" height="760" fill="#12100D"/>

  <!-- cornice doppia -->
  <rect x="28" y="28" width="1144" height="704" fill="none" stroke="#B08D4F" stroke-width="1.2"/>
  <rect x="40" y="40" width="1120" height="680" fill="none" stroke="#B08D4F" stroke-width="0.5" opacity="0.7"/>

  <!-- rosetta grande in filigrana dietro il numero -->
  <use href="#rosetta" transform="translate(600 430) scale(3.4)" opacity="0.10"/>

  <!-- rosette d'angolo -->
  <use href="#rosetta" transform="translate(112 112) scale(0.85)" opacity="0.5"/>
  <use href="#rosetta" transform="translate(1088 112) scale(0.85)" opacity="0.5"/>
  <use href="#rosetta" transform="translate(112 648) scale(0.85)" opacity="0.5"/>
  <use href="#rosetta" transform="translate(1088 648) scale(0.85)" opacity="0.5"/>

  <!-- bande incise a onda, alto e basso -->
  <g transform="translate(120 168)" opacity="0.4">
    <use href="#onda"/><use href="#onda" y="7"/><use href="#onda" y="14"/>
    <use href="#onda" y="21"/><use href="#onda" y="28"/>
  </g>
  <g transform="translate(120 566)" opacity="0.4">
    <use href="#onda"/><use href="#onda" y="7"/><use href="#onda" y="14"/>
    <use href="#onda" y="21"/><use href="#onda" y="28"/>
  </g>

  <!-- contenuto: il momento del costo reale -->
  <g text-anchor="middle">
    <text x="600" y="290" fill="#B08D4F" font-family="Helvetica, Arial, sans-serif"
          font-size="21" letter-spacing="7">COSTO REALE AL MESE</text>

    <text x="600" y="452" fill="url(#oroV)" font-size="156" font-weight="bold" letter-spacing="2">€ 177</text>

    <!-- filetto con diamante -->
    <line x1="452" y1="492" x2="566" y2="492" stroke="#B08D4F" stroke-width="1"/>
    <line x1="634" y1="492" x2="748" y2="492" stroke="#B08D4F" stroke-width="1"/>
    <path d="M600 484 l9 8 -9 8 -9 -8 Z" fill="none" stroke="#B08D4F" stroke-width="1"/>

    <text x="600" y="532" fill="#F2EEE6" opacity="0.88" font-size="25">Ford Fiesta Van N1 · tutto incluso · anticipo zero</text>

    <g opacity="0.5">
      <text x="600" y="566" fill="#F2EEE6" font-family="Helvetica, Arial, sans-serif" font-size="19">listino € 299 IVA inclusa</text>
      <line x1="516" y1="560" x2="684" y2="560" stroke="#F2EEE6" stroke-width="1.2"/>
    </g>
  </g>

  <text x="600" y="692" text-anchor="middle" fill="#B08D4F" font-size="16" letter-spacing="9">IMPERO AUTOMOTIVE</text>
</svg>
